<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fees Structure</title>
    <link rel="stylesheet" href="fees.css">
</head>
<body>

    <header class="topbar">
        <div class="container">
            <h1>School Fees Structure</h1>
            <p>Session 2026–2027</p>
        </div>
    </header>

    <section class="fees-section">
        <div class="container">

            <table class="fees-table">
                <thead>
                    <tr>
                        <th>Class</th>
                        <th>Admission Fee</th>
                        <th>Monthly Fee</th>
                        <th>Annual Charges</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Nursery</td>
                        <td>₹5,000</td>
                        <td>₹1,500</td>
                        <td>₹3,000</td>
                    </tr>

                    <tr>
                        <td>LKG</td>
                        <td>₹5,000</td>
                        <td>₹1,600</td>
                        <td>₹3,000</td>
                    </tr>

                    <tr>
                        <td>UKG</td>
                        <td>₹5,000</td>
                        <td>₹1,700</td>
                        <td>₹3,000</td>
                    </tr>

                    <tr>
                        <td>Class 1–5</td>
                        <td>₹6,000</td>
                        <td>₹2,000</td>
                        <td>₹4,000</td>
                    </tr>

                    <tr>
                        <td>Class 6–8</td>
                        <td>₹7,000</td>
                        <td>₹2,500</td>
                        <td>₹5,000</td>
                    </tr>

                    <tr>
                        <td>Class 9–10</td>
                        <td>₹8,000</td>
                        <td>₹3,000</td>
                        <td>₹6,000</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </section>

</body>
</html>
